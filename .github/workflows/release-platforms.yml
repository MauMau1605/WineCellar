name: Release Platforms

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Cache build_runner
        uses: actions/cache@v4
        with:
          path: .dart_tool/build
          key: ${{ runner.os }}-build-runner-${{ hashFiles('pubspec.lock', 'lib/**', 'test/**', 'build.yaml') }}
          restore-keys: |
            ${{ runner.os }}-build-runner-

      - name: Generate code (build_runner)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Run JSON import compatibility test
        run: flutter test test/features/wine_cellar/data/repositories/wine_repository_impl_test.dart

  release-android:
    runs-on: ubuntu-latest
    needs: release-checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Cache build_runner
        uses: actions/cache@v4
        with:
          path: .dart_tool/build
          key: ${{ runner.os }}-build-runner-${{ hashFiles('pubspec.lock', 'lib/**', 'test/**', 'build.yaml') }}
          restore-keys: |
            ${{ runner.os }}-build-runner-

      - name: Generate code (build_runner)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Android release APK
        run: flutter build apk --release

      - name: Rename release APK
        run: cp build/app/outputs/flutter-apk/app-release.apk wine-cellar-android-${{ github.ref_name }}.apk

      - name: Publish Android release asset
        uses: softprops/action-gh-release@v2
        with:
          files: wine-cellar-android-${{ github.ref_name }}.apk
          generate_release_notes: true

  release-windows:
    runs-on: windows-latest
    needs: release-checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Cache build_runner
        uses: actions/cache@v4
        with:
          path: .dart_tool/build
          key: ${{ runner.os }}-build-runner-${{ hashFiles('pubspec.lock', 'lib/**', 'test/**', 'build.yaml') }}
          restore-keys: |
            ${{ runner.os }}-build-runner-

      - name: Generate code (build_runner)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Generate Windows host project (if missing)
        run: flutter create --platforms=windows .

      - name: Build Windows release
        run: flutter build windows --release

      - name: Archive release folder
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath wine-cellar-windows-${{ github.ref_name }}.zip

      - name: Publish Windows release asset
        uses: softprops/action-gh-release@v2
        with:
          files: wine-cellar-windows-${{ github.ref_name }}.zip